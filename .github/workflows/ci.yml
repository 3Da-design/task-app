name: CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      sqlite:
        image: nouchka/sqlite3

    steps:
      - name: Checkout
        uses: actions/checkout@v3


      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate Key (.env)
        run: php artisan key:generate

      - name: Generate Key
        run: php artisan key:generate --env=testing

      - name: Run migrations
        run: php artisan migrate --env=testing

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse

      - name: Run PHPUnit
        run: php artisan test

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Newman
        run: npm install -g newman

      - name: Prepare SQLite DB for Newman
        run: |
          touch database/newman.sqlite
          DB_CONNECTION=sqlite DB_DATABASE=${{ github.workspace }}/database/newman.sqlite php artisan migrate --force

      - name: Start Laravel server
        run: DB_CONNECTION=sqlite DB_DATABASE=${{ github.workspace }}/database/newman.sqlite php artisan serve --host=127.0.0.1 --port=8000 > /tmp/laravel.log 2>&1 &

      - name: Wait for Laravel to be ready
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/api/tasks && exit 0
            sleep 1
          done
          echo "Laravel server did not start in time"
          cat /tmp/laravel.log
          exit 1

      - name: Run Postman tests
        run: newman run postman_collections.json